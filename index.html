<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오늘 뭐 입지?</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css">

  <style>
    :root{
      --bgTop: #fbfbfd;
      --bgMid: #f6f7fb;
      --bgBot: #f2f4fb;

      --text: rgba(15, 23, 42, .92);
      --muted: rgba(15, 23, 42, .60);

      --line: rgba(15, 23, 42, .10);
      --line2: rgba(15, 23, 42, .16);

      --accent: #4f46e5;
      --accent2: #2563eb;
      --accentLine: rgba(79,70,229,.26);
      --accentSoft: rgba(79,70,229,.08);

      --shadowSm: 0 10px 26px rgba(15, 23, 42, .08);
      --radius: 16px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      font-family: Pretendard, system-ui, -apple-system, "Noto Sans KR", "Segoe UI", Roboto, sans-serif;
      color:var(--text);
      letter-spacing: -0.01em;
      background:
        radial-gradient(900px 520px at 20% -10%, rgba(79,70,229,.10), transparent 62%),
        radial-gradient(900px 520px at 88% 4%, rgba(37,99,235,.08), transparent 64%),
        linear-gradient(180deg, var(--bgTop) 0%, var(--bgMid) 52%, var(--bgBot) 100%);
      padding: 26px 18px 40px;
    }

    .shell{
      max-width: 1040px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    /* TOP HEADER (NO BOX) */
    .topHeader{
      display:grid;
      gap: 8px;
      text-align:center;
      padding: 4px 2px 6px;
    }
    .overline{
      font-size: 11px;
      color: rgba(15,23,42,.54);
      letter-spacing: 0.12em;
      font-weight: 800;
      text-transform: uppercase;
    }
    .topHeader h1{
      margin:0;
      font-size: 38px;
      line-height: 1.04;
      letter-spacing: -0.06em;
      font-weight: 950;
    }
    .subline{
      font-size: 12px;
      color: rgba(15,23,42,.52);
      letter-spacing: 0.10em;
      font-weight: 750;
      text-transform: uppercase;
    }

    .statusLine{
      display:flex;
      justify-content:center;
      gap: 10px;
      flex-wrap:wrap;
      margin-top: 8px;
      color: rgba(15,23,42,.62);
      font-size: 12px;
      font-weight: 650;
    }
    .statusLine b{ color: rgba(15,23,42,.88); font-weight: 900; }
    .dotSep{ opacity:.45; }

    .page{ display:none; }
    .page.show{ display:block; }

    .section{
      padding: 14px 2px 4px;
      border-top: 1px solid var(--line);
    }
    .section:first-child{
      border-top: 0;
      padding-top: 0;
    }

    .sectionHead{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 10px;
      flex-wrap:wrap;
      margin-bottom: 10px;
    }
    .sectionHead b{
      font-weight: 950;
      font-size: 14px;
      letter-spacing:-0.02em;
    }
    .sectionHead span{
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .btnGrid4{
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 10px;
    }
    @media (max-width: 700px){
      .btnGrid4{ grid-template-columns: repeat(2, minmax(0,1fr)); }
    }

    .btnGrid2{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
    }
    @media (max-width: 700px){
      .btnGrid2{ grid-template-columns: 1fr; }
    }

    .btn{
      border: 1px solid var(--line);
      cursor:pointer;
      border-radius: 14px;
      padding: 12px 12px;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: rgba(15, 23, 42, .92);
      background: rgba(255,255,255,.96);
      box-shadow: none;
      transition: transform .12s ease, border-color .12s ease, background .12s ease, box-shadow .12s ease, opacity .12s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height: 46px;
      user-select:none;
    }
    .btn:hover{
      border-color: var(--line2);
      background: rgba(255,255,255,1);
      box-shadow: var(--shadowSm);
      transform: translateY(-1px);
    }
    .btn:active{
      transform: translateY(0px) scale(.995);
      box-shadow: none;
    }
    .btn.selected{
      color: rgba(255,255,255,.96);
      background: linear-gradient(135deg, rgba(79,70,229,.98), rgba(37,99,235,.92));
      border-color: rgba(255,255,255,.18);
      box-shadow: 0 14px 30px rgba(37,99,235,.16);
    }
    .btn:focus-visible{
      outline: 3px solid rgba(37,99,235,.34);
      outline-offset: 2px;
    }
    .btn[disabled]{
      cursor:not-allowed;
      opacity:.55;
      transform:none !important;
      box-shadow:none !important;
    }
    .btn[disabled]:hover{
      transform:none;
      box-shadow:none;
      border-color: var(--line);
      background: rgba(255,255,255,.96);
    }

    .btn.cta{
      justify-content:center;
      color: rgba(255,255,255,.96);
      background: linear-gradient(135deg, rgba(79,70,229,.98), rgba(37,99,235,.92));
      border-color: rgba(255,255,255,.18);
      box-shadow: 0 14px 30px rgba(37,99,235,.16);
    }
    .btn.cta:hover{
      transform: translateY(-1px);
      box-shadow: 0 18px 44px rgba(37,99,235,.20);
    }

    .pickBanner{
      display:none;
      align-items:center;
      gap: 10px;
      padding: 10px 0 2px;
      margin-bottom: 8px;
      color: rgba(15,23,42,.86);
    }
    .pickBanner.show{ display:flex; }
    .pickBanner .dot{
      width: 10px; height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(79,70,229,.10);
      flex: 0 0 auto;
    }
    .pickBanner b{
      font-weight: 950;
      letter-spacing: -0.02em;
      font-size: 13px;
    }
    .pickBanner span{
      font-size: 12px;
      color: rgba(15,23,42,.62);
      font-weight: 650;
      margin-left: 8px;
    }

    .attention .btn{
      animation: pulse 1.15s ease-in-out infinite;
      border-color: var(--accentLine);
      box-shadow: 0 0 0 0 rgba(79,70,229,.14);
    }
    .attention .btn:nth-child(2){ animation-delay: .05s; }
    .attention .btn:nth-child(3){ animation-delay: .10s; }
    .attention .btn:nth-child(4){ animation-delay: .15s; }
    @keyframes pulse{
      0%   { transform: translateY(0); box-shadow: 0 0 0 0 rgba(79,70,229,.14); }
      50%  { transform: translateY(-1px); box-shadow: 0 0 0 6px rgba(79,70,229,.08); }
      100% { transform: translateY(0); box-shadow: 0 0 0 0 rgba(79,70,229,.14); }
    }
    @media (prefers-reduced-motion: reduce){
      .attention .btn{ animation: none !important; }
    }

    .tooltip{
      position: fixed;
      z-index: 20000;
      max-width: min(360px, calc(100vw - 24px));
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.95);
      border: 1px solid var(--line);
      box-shadow: 0 16px 40px rgba(15,23,42,.12);
      backdrop-filter: blur(10px);
      display:none;
      transform: translateY(6px);
      opacity: 0;
      transition: opacity .12s ease, transform .12s ease;
      pointer-events:none;
    }
    .tooltip.show{
      display:block;
      opacity: 1;
      transform: translateY(0);
    }
    .tooltip .tTitle{
      font-size: 12px;
      font-weight: 950;
      color: rgba(15,23,42,.86);
      margin-bottom: 6px;
    }
    .tooltip .tDesc{
      font-size: 12px;
      line-height: 1.55;
      color: rgba(15,23,42,.72);
      white-space: pre-line;
      font-weight: 650;
    }

    /* PAGE 2 */
    .mainTop{
      border-top: 1px solid var(--line);
      padding-top: 14px;
      display:grid;
      gap: 10px;
    }

    /* ✅ Context bar (시인성 강화: 배경/테두리) */
    .contextBar{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.82);
      border-radius: 14px;
      padding: 10px 12px;
      display:flex;
      gap: 10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .contextBar strong{
      font-size: 12px;
      font-weight: 950;
      color: rgba(15,23,42,.86);
      letter-spacing:-0.01em;
    }
    .contextBar .kv{
      font-size: 12px;
      color: rgba(15,23,42,.66);
      font-weight: 750;
    }
    .contextBar .kv b{
      color: rgba(15,23,42,.88);
      font-weight: 950;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(15,23,42,.03);
      margin-left: 6px;
    }
    .contextBar .kv b.on{
      border-color: var(--accentLine);
      background: var(--accentSoft);
    }

    /* Tabs */
    .tabs{
      display:grid;
      gap: 10px;
    }
    .tabBar{
      display:flex;
      flex-wrap:wrap;
      gap: 8px;
      align-items:center;
    }
    .tabLabel{
      font-size: 12px;
      font-weight: 850;
      color: rgba(15,23,42,.72);
      margin-right: 4px;
    }
    .tabBtn{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.92);
      color: rgba(15,23,42,.88);
      border-radius: 999px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: -0.02em;
      cursor: pointer;
      transition: border-color .12s ease, box-shadow .12s ease, transform .12s ease, opacity .12s ease, background .12s ease;
      user-select:none;
    }
    .tabBtn:hover{
      border-color: var(--line2);
      box-shadow: 0 10px 24px rgba(15,23,42,.08);
      transform: translateY(-1px);
    }
    .tabBtn:active{
      transform: translateY(0);
      box-shadow: none;
    }
    .tabBtn.selected{
      color: rgba(15,23,42,.92);
      background: rgba(79,70,229,.10);
      border-color: rgba(79,70,229,.34);
      box-shadow: 0 14px 30px rgba(37,99,235,.10);
    }
    .tabBtn[disabled]{
      cursor:not-allowed;
      opacity:.55;
      transform:none !important;
      box-shadow:none !important;
    }
    .tabBtn[disabled]:hover{
      transform:none;
      box-shadow:none;
      border-color: var(--line);
    }

    .grid{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 14px;
      align-items:start;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }
    @media (max-width: 960px){
      .grid{ grid-template-columns: 1fr; }
    }

    /* Recommendation UI */
    .card{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.86);
      border-radius: 14px;
      padding: 12px;
      display:grid;
      gap: 10px;
    }
    .cardHead{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 10px;
      flex-wrap:wrap;
    }
    .cardHead b{
      font-size: 13px;
      font-weight: 950;
      letter-spacing:-0.02em;
      color: rgba(15,23,42,.90);
    }
    .cardHead span{
      font-size: 12px;
      color: rgba(15,23,42,.62);
      font-weight: 650;
    }

    .swatchBtn{
      justify-content:space-between;
      gap: 10px;
    }
    .swatch{
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid rgba(15, 23, 42, .16);
      box-shadow: 0 10px 18px rgba(15, 23, 42, .08);
      flex: 0 0 auto;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap: 8px;
    }
    .chip{
      cursor:pointer;
      user-select:none;
      border-radius: 999px;
      padding: 10px 12px;
      border: 1px solid rgba(15,23,42,.14);
      background: rgba(255,255,255,.88);
      font-weight: 900;
      letter-spacing:-0.01em;
      display:inline-flex;
      align-items:center;
      gap: 10px;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
      color: rgba(15,23,42,.88);
    }
    .chip:hover{
      transform: translateY(-1px);
      border-color: rgba(15,23,42,.22);
      box-shadow: 0 12px 26px rgba(15,23,42,.10);
    }
    .chip:active{
      transform: translateY(0) scale(.995);
      box-shadow: none;
    }
    .chip .swatch{ width: 12px; height: 12px; border-radius: 4px; box-shadow:none; }

    .empty{
      padding: 10px 0;
      font-size: 12px;
      color: rgba(15,23,42,.62);
      font-weight: 650;
    }

    .toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(255,255,255,.94);
      border: 1px solid var(--line);
      color: rgba(15, 23, 42, .92);
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 13px;
      display:none;
      z-index: 10000;
      box-shadow: 0 14px 34px rgba(15,23,42,.10);
      font-weight: 800;
    }
    .toast.show{ display:block; animation: toast .18s ease both; }
    @keyframes toast{
      from{ transform: translateX(-50%) translateY(6px); opacity:0; }
      to{ transform: translateX(-50%) translateY(0); opacity:1; }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topHeader" aria-label="헤더">
      <div class="overline">남자는 핏과 컬러가 전부다.</div>
      <h1>오늘 뭐 입지?</h1>
      <div class="subline">Men's fashion color match</div>

      <div class="statusLine" aria-label="선택 상태">
        <div><b>1) 계절</b>: <span id="pillSeasonVal">아직</span></div>
        <span class="dotSep">·</span>
        <div><b>2) 기능</b>: <span id="pillNeedVal">아직</span></div>
      </div>
    </header>

    <!-- PAGE 1 -->
    <main class="page show" id="pageSetup" aria-label="첫 페이지: 옵션 선택">
      <div class="pickBanner show" id="bannerSeason" role="note" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <b>먼저 계절을 선택하세요</b>
        <span>봄 / 여름 / 가을 / 겨울 중 하나</span>
      </div>

      <section class="section" id="secSeason" aria-label="계절 선택">
        <div class="sectionHead">
          <b>1. 언제 입으실건가요?</b>
          <span>버튼 hover 시 설명</span>
        </div>

        <div class="btnGrid4 attention" id="seasonButtons">
          <button class="btn" type="button" data-season="봄">봄</button>
          <button class="btn" type="button" data-season="여름">여름</button>
          <button class="btn" type="button" data-season="가을">가을</button>
          <button class="btn" type="button" data-season="겨울">겨울</button>
        </div>
      </section>

      <div class="pickBanner" id="bannerNeed" role="note" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <b>다음으로 필요한 기능을 선택하세요</b>
        <span>4개 중 하나 (현재 2개만 선택 가능)</span>
      </div>

      <section class="section" id="secNeed" aria-label="기능 선택">
        <div class="sectionHead">
          <b>2. 무엇이 필요한가요?</b>
          <span>버튼 hover 시 상세 설명</span>
        </div>

        <div class="btnGrid2" id="needButtonsAll">
          <div class="btnGrid2 attention" id="needButtonsActive">
            <button class="btn" type="button" data-need="pantsToTop">하의에 맞는 상의 (기본)</button>
            <button class="btn" type="button" data-need="topToPants">상의에 맞는 하의</button>
          </div>

          <div class="btnGrid2" id="needButtonsDisabled">
            <button class="btn" type="button" data-need="outerToIn" disabled aria-disabled="true">
              아우터에 맞는 상/하의 (서비스 준비중)
            </button>
            <button class="btn" type="button" data-need="premium" disabled aria-disabled="true">
              Premium : 맞춤형 (서비스 준비중)
            </button>
          </div>
        </div>

        <div style="display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; margin-top:10px; border-top:1px solid var(--line); padding-top:12px;">
          <button class="btn" type="button" id="btnReset">초기화</button>
          <button class="btn cta" type="button" id="btnGo" disabled>추천받기 (선택 필요)</button>
        </div>
      </section>
    </main>

    <!-- PAGE 2 -->
    <main class="page" id="pageMain" aria-label="두 번째 페이지: 추천 화면">
      <section class="mainTop">
        <div class="contextBar" aria-label="현재 선택 요약">
          <strong>현재 선택</strong>
          <div class="kv">계절<b id="ctxSeason">아직</b></div>
          <div class="kv">기능<b id="ctxNeed">아직</b></div>
          <div class="kv">기준 색<b id="ctxBaseColor">아직</b></div>
        </div>

        <div class="tabs" aria-label="컨텍스트 탭">
          <div class="tabBar" id="seasonTabs" aria-label="계절 탭">
            <span class="tabLabel">계절</span>
            <button class="tabBtn" type="button" data-season-tab="봄">봄</button>
            <button class="tabBtn" type="button" data-season-tab="여름">여름</button>
            <button class="tabBtn" type="button" data-season-tab="가을">가을</button>
            <button class="tabBtn" type="button" data-season-tab="겨울">겨울</button>
          </div>

          <div class="tabBar" id="needTabs" aria-label="기능 탭">
            <span class="tabLabel">기능</span>
            <button class="tabBtn" type="button" data-need-tab="pantsToTop">하의 → 상의</button>
            <button class="tabBtn" type="button" data-need-tab="topToPants">상의 → 하의</button>
            <button class="tabBtn" type="button" data-need-tab="outerToIn" disabled aria-disabled="true">아우터 → 이너 (서비스 준비중)</button>
          </div>
        </div>
      </section>

      <section class="grid" aria-label="추천 UI">
        <section id="mainLeft"></section>
        <section id="mainRight"></section>
      </section>
    </main>
  </div>

  <div class="tooltip" id="tooltip" role="note" aria-live="polite">
    <div class="tTitle" id="tooltipTitle">상세 설명</div>
    <div class="tDesc" id="tooltipDesc">-상세 설명 준비중-</div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    // =========================================================
    // 1) 색 팔레트(기존 사용 색 유지)
    // =========================================================
    const COLORS = {
      "녹색":   { hex:"#2F7D57" },
      "파란색": { hex:"#2F5FAF" },
      "노란색": { hex:"#D7A63A" },
      "핑크":   { hex:"#D08AAA" },
      "네이비": { hex:"#1D2B5B" },
      "흰색":   { hex:"#F3F4F6" },
      "진청":   { hex:"#1F3B6F" },
      "흑청":   { hex:"#16233A" },
      "연청":   { hex:"#82A9D6" },
      "아이보리": { hex:"#F2EBDD" },
      "크림":   { hex:"#F6E6C8" },
      "베이지": { hex:"#C7B08B" },
      "카키":   { hex:"#6B7B4E" },
      "브라운": { hex:"#6B3F2A" },
      "차콜":   { hex:"#3A3C43" },
      "검정":   { hex:"#111318" }
    };

    // =========================================================
    // 2) 기존 RULES(하의→상의): pantsColor -> shirtColor 추천
    //    *정합성 보장: 추천 칩은 이 RULES에서만 나오게 구현*
    // =========================================================
    const RULES_PANTS_TO_TOP = {
      "진청": {
        good: [
          { color:"파란색", grade:"강추" },
          { color:"노란색", grade:"강추" }
        ],
        bad: [
          { color:"네이비", grade:"비추" }
        ],
        meh: [
          { color:"핑크", grade:"괜찮음" },
          { color:"흰색", grade:"강추" }
        ]
      },
      "흑청": {
        good: [
          { color:"흰색", grade:"강추" },
          { color:"노란색", grade:"강추" }
        ],
        bad: [
          { color:"네이비", grade:"비추" }
        ],
        meh: [
          { color:"핑크", grade:"괜찮음" },
          { color:"베이지", grade:"괜찮음" }
        ]
      },
      "연청": {
        good: [
          { color:"녹색", grade:"강추" },
          { color:"흰색", grade:"강추" }
        ],
        bad: [
          { color:"노란색", grade:"비추" }
        ],
        meh: [

    // =========================================================
    // 3) “상의→하의” 역룰 생성(정합성: 원본 RULES로부터만 생성)
    //    shirtColor -> pantsColor 추천
    // =========================================================
    function buildInverseRules(pantsToTopRules){
      const inv = {};
      const ensure = (shirt)=>{
        if (!inv[shirt]) inv[shirt] = { good:[], bad:[], meh:[] };
        return inv[shirt];
      };

      for (const pants of Object.keys(pantsToTopRules)){
        const r = pantsToTopRules[pants] || {};
        (r.good || []).forEach(it => ensure(it.color).good.push({ color: pants, grade: it.grade }));
        (r.bad  || []).forEach(it => ensure(it.color).bad.push({  color: pants, grade: it.grade }));
        (r.meh  || []).forEach(it => ensure(it.color).meh.push({  color: pants, grade: it.grade }));
      }

      // 중복 제거(정합 유지하면서 unique)
      const uniq = (arr)=>{
        const seen = new Set();
        const out = [];
        for (const it of arr){
          const k = it.color + "|" + it.grade;
          if (seen.has(k)) continue;
          seen.add(k);
          out.push(it);
        }
        return out;
      };

      for (const shirt of Object.keys(inv)){
        inv[shirt].good = uniq(inv[shirt].good);
        inv[shirt].bad  = uniq(inv[shirt].bad);
        inv[shirt].meh  = uniq(inv[shirt].meh);
      }
      return inv;
    }

    const RULES_TOP_TO_PANTS = buildInverseRules(RULES_PANTS_TO_TOP);

    // =========================================================
    // 4) 온보딩 설명(hover tooltip)
    // =========================================================
    const NEED_DESC = {
      pantsToTop: "- 오늘 입을 바지를 고르면 어울리는 컬러를 추천해드립니다.",
      topToPants: "- 오늘 입을 셔츠(상의) 컬러를 고르면 어울리는 하의 컬러를 추천해드립니다.",
      outerToIn:  "- 오늘 입을 아우터를 고르면 안에 입을 상/하의의 컬러 매치를 추천해드립니다.\n- 현재 서비스 준비중입니다.",
      premium:    "- 현재 서비스 준비중입니다."
    };
    const SEASON_DESC = {
      "봄": "-상세 설명 준비중-",
      "여름": "-상세 설명 준비중-",
      "가을": "-상세 설명 준비중-",
      "겨울": "-상세 설명 준비중-"
    };

    // =========================================================
    // 5) 추천 UI 렌더(정합 강제: RULE에서만 칩 생성)
    // =========================================================
    const PANTS_LIST = ["진청","흑청","연청","아이보리","크림","베이지","카키","브라운","차콜","검정"];

    function validateColorsStrict(){
      const miss = [];
      const checkRule = (rules)=>{
        for (const k of Object.keys(rules)){
          if (!COLORS[k] && !PANTS_LIST.includes(k)) miss.push(k);
          const r = rules[k] || {};
          ["good","bad","meh"].forEach(g=>{
            (r[g]||[]).forEach(it=>{
              if (!COLORS[it.color] && !PANTS_LIST.includes(it.color)) miss.push(it.color);
            });
          });
        }
      };
      checkRule(RULES_PANTS_TO_TOP);
      checkRule(RULES_TOP_TO_PANTS);
      const u = [...new Set(miss)];
      if (u.length) console.warn("COLORS에 없는 색/키가 RULE에 존재:", u);
    }

    function swatchHex(name){
      const c = COLORS[name];
      return c ? c.hex : "#CBD5E1";
    }

    function labelNeed(need){
      if (need === "pantsToTop") return "하의→상의(기본)";
      if (need === "topToPants") return "상의→하의";
      if (need === "outerToIn")  return "아우터→이너(서비스 준비중)";
      if (need === "premium")    return "프리미엄(서비스 준비중)";
      return "아직";
    }

    function renderSwatchButtons({ mountEl, title, subtitle, list, selected, onPick }){
      mountEl.innerHTML = "";
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="cardHead">
          <b>${title}</b>
          <span>${subtitle}</span>
        </div>
        <div class="btnGrid2" id="__grid"></div>
      `;
      const grid = card.querySelector("#__grid");

      list.forEach(name=>{
        const b = document.createElement("button");
        b.type = "button";
        b.className = "btn swatchBtn";
        b.setAttribute("data-name", name);
        b.innerHTML = `<span>${name}</span><span class="swatch" style="background:${swatchHex(name)}"></span>`;
        if (selected === name) b.classList.add("selected");
        b.addEventListener("click", ()=> onPick(name));
        grid.appendChild(b);
      });

      mountEl.appendChild(card);
    }

    function renderChipsGroup({ mountEl, title, hint, items, onPick }){
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="cardHead">
          <b>${title}</b>
          <span>${hint}</span>
        </div>
        <div class="chips"></div>
      `;
      const chips = card.querySelector(".chips");

      if (!items || !items.length){
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "없음";
        card.appendChild(empty);
        mountEl.appendChild(card);
        return;
      }

      items.forEach(it=>{
        const c = document.createElement("div");
        c.className = "chip";
        c.setAttribute("role","button");
        c.setAttribute("tabindex","0");
        c.innerHTML = `<span class="swatch" style="background:${swatchHex(it.color)}"></span><span>${it.color}</span>`;
        const apply = ()=> onPick(it);
        c.addEventListener("click", apply);
        c.addEventListener("keydown", (e)=>{
          if (e.key === "Enter" || e.key === " "){
            e.preventDefault();
            apply();
          }
        });
        chips.appendChild(c);
      });

      mountEl.appendChild(card);
    }

    // =========================================================
    // 6) App UI
    // =========================================================
    const AppUI = {
      state: {
        season: null,
        need: null,              // pantsToTop | topToPants
        baseColor: null,         // 선택한 기준 색(하의 or 상의)
        lastPicked: null          // 마지막으로 클릭한 추천 아이템(표시용)
      },
      el: {},
      tip: { visible:false },

      init(){
        this.cache();
        this.bind();
        this.syncGuidance();
        this.refreshPills();
        this.refreshCTA();
        this.syncTabs();
        this.refreshContextBar();
        validateColorsStrict();
      },

      cache(){
        this.el = {
          pageSetup: document.getElementById("pageSetup"),
          pageMain: document.getElementById("pageMain"),
          toast: document.getElementById("toast"),

          seasonButtons: document.getElementById("seasonButtons"),
          needActiveWrap: document.getElementById("needButtonsActive"),
          needDisabledWrap: document.getElementById("needButtonsDisabled"),

          pillSeasonVal: document.getElementById("pillSeasonVal"),
          pillNeedVal: document.getElementById("pillNeedVal"),

          bannerSeason: document.getElementById("bannerSeason"),
          bannerNeed: document.getElementById("bannerNeed"),
          secNeed: document.getElementById("secNeed"),

          btnReset: document.getElementById("btnReset"),
          btnGo: document.getElementById("btnGo"),

          tooltip: document.getElementById("tooltip"),
          tooltipTitle: document.getElementById("tooltipTitle"),
          tooltipDesc: document.getElementById("tooltipDesc"),

          seasonTabs: document.getElementById("seasonTabs"),
          needTabs: document.getElementById("needTabs"),

          // page2
          ctxSeason: document.getElementById("ctxSeason"),
          ctxNeed: document.getElementById("ctxNeed"),
          ctxBaseColor: document.getElementById("ctxBaseColor"),
          mainLeft: document.getElementById("mainLeft"),
          mainRight: document.getElementById("mainRight")
        };
      },

      bind(){
        window.addEventListener("mousemove", (e)=>{
          if (!this.tip.visible) return;
          this.positionTooltip(e.clientX, e.clientY);
        }, { passive:true });

        // Setup: season
        this.el.seasonButtons.querySelectorAll("button").forEach(btn=>{
          const season = btn.getAttribute("data-season");

          btn.addEventListener("click", ()=>{
            this.setSeason(season, { from:"setup", scrollToNeed:true });
          });

          btn.addEventListener("mouseenter", (e)=>{
            this.showTooltip("상세 설명", SEASON_DESC[season] || "-상세 설명 준비중-", e.clientX, e.clientY);
          });
          btn.addEventListener("mouseleave", ()=> this.hideTooltip());
        });

        // Setup: need (active selectable)
        this.el.needActiveWrap.querySelectorAll("button").forEach(btn=>{
          const need = btn.getAttribute("data-need");

          btn.addEventListener("click", ()=>{

              this.toast("먼저 계절을 선택하세요");
              this.syncGuidance();
              return;
            }
            this.setNeed(need, { from:"setup" });
          });

          btn.addEventListener("mouseenter", (e)=>{
            this.showTooltip("상세 설명", NEED_DESC[need] || "-", e.clientX, e.clientY);
          });
          btn.addEventListener("mouseleave", ()=> this.hideTooltip());
        });

        // Setup: need (disabled hover only)
        this.el.needDisabledWrap.querySelectorAll("button").forEach(btn=>{
          const need = btn.getAttribute("data-need");
          btn.addEventListener("mouseenter", (e)=>{
            this.showTooltip("상세 설명", NEED_DESC[need] || "- 현재 서비스 준비중입니다.", e.clientX, e.clientY);
          });
          btn.addEventListener("mouseleave", ()=> this.hideTooltip());
        });

        // CTA
        this.el.btnGo.addEventListener("click", ()=>{
          if (!this.isReady()){
            this.toast("두 항목을 모두 선택하세요");
            this.syncGuidance();
            return;
          }
          // 모드에 따라 baseColor 초기값(없으면 null 유지)
          this.showPage("main");
          this.syncTabs();
          this.refreshContextBar();
          this.renderMain();     // ✅ 추천 UI 생성
          this.toast("추천 화면으로 이동");
        });

        // Reset
        this.el.btnReset.addEventListener("click", ()=>{
          this.state.season = null;
          this.state.need = null;
          this.state.baseColor = null;
          this.state.lastPicked = null;

          this.clearSelected(this.el.seasonButtons);
          this.clearSelected(this.el.needActiveWrap);

          this.showPage("setup");
          this.syncGuidance();
          this.refreshPills();
          this.refreshCTA();
          this.syncTabs();
          this.refreshContextBar();
          this.toast("초기화 완료");
        });

        // Tabs: season
        this.el.seasonTabs.querySelectorAll("button[data-season-tab]").forEach(btn=>{
          const season = btn.getAttribute("data-season-tab");
          btn.addEventListener("click", ()=>{
            this.setSeason(season, { from:"main" });
          });
          btn.addEventListener("mouseenter", (e)=>{
            this.showTooltip("상세 설명", SEASON_DESC[season] || "-상세 설명 준비중-", e.clientX, e.clientY);
          });
          btn.addEventListener("mouseleave", ()=> this.hideTooltip());
        });

        // Tabs: need
        this.el.needTabs.querySelectorAll("button[data-need-tab]").forEach(btn=>{
          const need = btn.getAttribute("data-need-tab");
          const disabled = btn.hasAttribute("disabled");
          btn.addEventListener("click", ()=>{
            if (disabled) return;
            if (!this.state.season){
              this.toast("먼저 계절을 선택하세요");
              return;
            }
            this.setNeed(need, { from:"main" });
          });
          btn.addEventListener("mouseenter", (e)=>{
            this.showTooltip("상세 설명", NEED_DESC[need] || "-", e.clientX, e.clientY);
          });
          btn.addEventListener("mouseleave", ()=> this.hideTooltip());
        });

        window.addEventListener("scroll", ()=>{ if (this.tip.visible) this.hideTooltip(); }, { passive:true });
        window.addEventListener("resize", ()=>{ if (this.tip.visible) this.hideTooltip(); }, { passive:true });
      },

      // ===== State setters
      setSeason(season, opts){
        this.state.season = season;
        this.selectTextMatch(this.el.seasonButtons, season);

        this.refreshPills();
        this.refreshCTA();
        this.syncGuidance(!!(opts && opts.scrollToNeed));
        this.syncTabs();
        this.refreshContextBar();

        this.toast(`${season} 선택`);

        if (opts && opts.from === "main"){
          this.renderMain();
        }
      },

      setNeed(need, opts){
        this.clearSelected(this.el.needActiveWrap);
        const btn = this.el.needActiveWrap.querySelector(`button[data-need="${need}"]`);
        if (btn) btn.classList.add("selected");

        this.state.need = need;
        this.state.baseColor = null;
        this.state.lastPicked = null;

        this.refreshPills();
        this.refreshCTA();
        this.syncGuidance();
        this.syncTabs();
        this.refreshContextBar();

        this.toast(`${labelNeed(need)} 선택`);

        if (opts && opts.from === "main"){
          this.renderMain();
        }
      },

      // ===== Rendering: PAGE 2 main recommendation UI
      renderMain(){
        if (!this.el.pageMain.classList.contains("show")) return;

        const need = this.state.need;
        const base = this.state.baseColor;

        // left: 기준 색 선택
        if (need === "pantsToTop"){
          renderSwatchButtons({
            mountEl: this.el.mainLeft,
            title: "1) 하의 색 선택",
            subtitle: "하의를 고르면 상의 추천이 나옵니다",
            list: PANTS_LIST,
            selected: base,
            onPick: (name)=>{
              this.state.baseColor = name;
              this.state.lastPicked = null;
              this.refreshContextBar();
              this.renderMain();
              this.toast(`${name} 하의 선택`);
            }
          });
        } else if (need === "topToPants"){
          // 상의 색 목록은 “역룰에 존재하는 상의 키”만(정합성)
          const tops = Object.keys(RULES_TOP_TO_PANTS).filter(k => COLORS[k]).sort((a,b)=>a.localeCompare(b,"ko"));
          renderSwatchButtons({
            mountEl: this.el.mainLeft,
            title: "1) 상의 색 선택",
            subtitle: "상의(셔츠/상의) 색을 고르면 하의 추천이 나옵니다",
            list: tops,
            selected: base,
            onPick: (name)=>{
              this.state.baseColor = name;
              this.state.lastPicked = null;
              this.refreshContextBar();
              this.renderMain();
              this.toast(`${name} 상의 선택`);
            }
          });
        } else {
          this.el.mainLeft.innerHTML = `<div class="card"><div class="empty">서비스 준비중입니다.</div></div>`;
          this.el.mainRight.innerHTML = "";
          return;
        }

        // right: 추천/비추/대안(그닥) — RULE에서만
        this.el.mainRight.innerHTML = "";
        if (!base){
          const msg = document.createElement("div");
          msg.className = "card";
          msg.innerHTML = `<div class="empty">기준 색을 먼저 선택하세요.</div>`;
          this.el.mainRight.appendChild(msg);
          return;
        }

        const rules = (need === "pantsToTop") ? RULES_PANTS_TO_TOP : RULES_TOP_TO_PANTS;
        const r = rules[base];

        if (!r){
          const msg = document.createElement("div");
          msg.className = "card";
          msg.innerHTML = `<div class="empty">이 색에 대한 RULE이 없습니다. (정합성 유지 때문에 추천을 생성하지 않습니다)</div>`;
          this.el.mainRight.appendChild(msg);
          return;
        }

        const onPick = (it)=>{
          this.state.lastPicked = it;
          this.refreshContextBar();
          this.toast(`${it.color} 선택 (${it.grade})`);
        };

        renderChipsGroup({
          mountEl: this.el.mainRight,
          title: "2) 추천 컬러",
          hint: "RULE에서만 표시",
          items: (r.good || []),
          onPick
        });

        renderChipsGroup({
          mountEl: this.el.mainRight,
          title: "3) 비추 컬러",
          hint: "RULE에서만 표시",
          items: (r.bad || []),
          onPick
        });

        renderChipsGroup({
          mountEl: this.el.mainRight,
          title: "4) 대안 (그닥)",
          hint: "RULE에서만 표시",
          items: (r.meh || []),
          onPick
        });
      },

      // ===== UI sync
      syncTabs(){
        // season tabs
        this.el.seasonTabs.querySelectorAll("button[data-season-tab]").forEach(b=>{
          const s = b.getAttribute("data-season-tab");
          if (this.state.season && s === this.state.season) b.classList.add("selected");
          else b.classList.remove("selected");
        });
        // need tabs
        this.el.needTabs.querySelectorAll("button[data-need-tab]").forEach(b=>{
          const n = b.getAttribute("data-need-tab");
          if (this.state.need && n === this.state.need) b.classList.add("selected");
          else b.classList.remove("selected");
        });
      },

      refreshContextBar(){
        const season = this.state.season || "아직";
        const need = this.state.need ? labelNeed(this.state.need) : "아직";
        const base = this.state.baseColor || "아직";

        this.el.ctxSeason.textContent = season;
        this.el.ctxNeed.textContent = need;
        this.el.ctxBaseColor.textContent = base;

        // 강조(배경/테두리만)
        const setOn = (el, on)=> on ? el.classList.add("on") : el.classList.remove("on");
        setOn(this.el.ctxSeason, !!this.state.season);
        setOn(this.el.ctxNeed, !!this.state.need);
        setOn(this.el.ctxBaseColor, !!this.state.baseColor);
      },

      isReady(){ return !!(this.state.season && this.state.need); },

      refreshCTA(){
        const ready = this.isReady();
        this.el.btnGo.disabled = !ready;
        this.el.btnGo.textContent = ready ? "추천받기" : "추천받기 (선택 필요)";
      },

      refreshPills(){
        this.el.pillSeasonVal.textContent = this.state.season || "아직";
        this.el.pillNeedVal.textContent = this.state.need ? labelNeed(this.state.need) : "아직";
      },

      selectTextMatch(container, text){
        container.querySelectorAll("button").forEach(b=>{
          if ((b.textContent || "").trim() === text) b.classList.add("selected");
          else b.classList.remove("selected");
        });
      },

      clearSelected(container){
        container.querySelectorAll("button").forEach(b=> b.classList.remove("selected"));
      },

      syncGuidance(scrollToNeed){
        if (!this.state.season){
          this.el.bannerSeason.classList.add("show");
          this.el.bannerNeed.classList.remove("show");
          this.el.seasonButtons.classList.add("attention");
          this.el.needActiveWrap.classList.remove("attention");
          return;
        }

        if (this.state.season && !this.state.need){
          this.el.bannerSeason.classList.remove("show");
          this.el.bannerNeed.classList.add("show");
          this.el.seasonButtons.classList.remove("attention");
          this.el.needActiveWrap.classList.add("attention");
          if (scrollToNeed){
            this.el.secNeed.scrollIntoView({ behavior:"smooth", block:"start" });
          }
          return;
        }

        this.el.bannerSeason.classList.remove("show");
        this.el.bannerNeed.classList.remove("show");
        this.el.seasonButtons.classList.remove("attention");
        this.el.needActiveWrap.classList.remove("attention");
      },

      showPage(which){
        if (which === "setup"){
          this.el.pageSetup.classList.add("show");
          this.el.pageMain.classList.remove("show");
        }else{
          this.el.pageSetup.classList.remove("show");
          this.el.pageMain.classList.add("show");
        }
      },

      toast(msg){
        this.el.toast.textContent = msg;
        this.el.toast.classList.add("show");
        clearTimeout(this._t);
        this._t = setTimeout(()=> this.el.toast.classList.remove("show"), 1200);
      },

      showTooltip(title, desc, x, y){
        this.tip.visible = true;
        this.el.tooltipTitle.textContent = title || "상세 설명";
        this.el.tooltipDesc.textContent = desc || "-상세 설명 준비중-";
        this.el.tooltip.classList.add("show");
        this.positionTooltip(x, y);
      },
      hideTooltip(){
        this.tip.visible = false;
        this.el.tooltip.classList.remove("show");
      },
      positionTooltip(x, y){
        const tip = this.el.tooltip;
        const pad = 12;
        const offset = 14;

        const rect = tip.getBoundingClientRect();
        let left = x + offset;
        let top  = y + offset;

        const vw = window.innerWidth;
        const vh = window.innerHeight;

        if (left + rect.width + pad > vw) left = x - rect.width - offset;
        if (left < pad) left = pad;

        if (top + rect.height + pad > vh) top = y - rect.height - offset;
        if (top < pad) top = pad;

        tip.style.left = left + "px";
        tip.style.top  = top + "px";
      }
    };

    AppUI.init();
  </script>
</body>
</html>
